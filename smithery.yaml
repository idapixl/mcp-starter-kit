startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      serverName:
        type: string
        description: Name for this MCP server instance
        default: my-mcp-server
      fileReaderRoot:
        type: string
        description: Root directory the file reader can access (restrict to a safe path)
        default: ./workspace
      fetchMaxBytes:
        type: number
        description: Maximum response size to fetch in bytes
        default: 1048576
      logLevel:
        type: string
        enum: [debug, info, warn, error]
        description: Log verbosity
        default: info
    required: []
  commandFunction: |-
    (config) => ({
      command: "node",
      args: ["dist/index.js"],
      env: {
        SERVER_NAME: config.serverName || "my-mcp-server",
        FILE_READER_ROOT: config.fileReaderRoot || "./workspace",
        FETCH_MAX_BYTES: String(config.fetchMaxBytes || 1048576),
        LOG_LEVEL: config.logLevel || "info"
      }
    })
